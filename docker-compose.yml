version: '3.8'

services:
  # قاعدة بيانات PostgreSQL
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: webhook_db
    ports:
      - "5432:5432"

  # خادم Redis لإدارة الطوابير
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # تطبيق الـ API الأساسي
  app:
    build: .
    command: >
      sh -c "npx drizzle-kit push && node dist/index.js"
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@postgres:5432/webhook_db}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev_secret_key}

  # العامل الخلفي لمعالجة المهام
  worker:
    build: .
    command: node dist/worker.js
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@postgres:5432/webhook_db}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}