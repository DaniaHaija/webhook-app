version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: webhook_db
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  app:
    build: .
    command: >
      sh -c "npx drizzle-kit push && node dist/index.js"
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      # نستخدم اسم الخدمة 'postgres' و 'redis' كعنوان للهوست
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@postgres:5432/webhook_db}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-super-secret-key}

  worker:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@postgres:5432/webhook_db}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    command: node dist/worker.js